<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Dual-Stick Deflector</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #333;
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }
        #instructions {
            margin-top: 15px;
            color: #aaa;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="instructions">
        Connect Xbox Controller & Press Any Button to Start<br>
        <span style="color: #00CCFF;">Left Stick = Light Blue Shield</span> | 
        <span style="color: #FF8C00;">Right Stick = Orange Shield</span>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const CENTER_X = canvas.width / 2;
const CENTER_Y = canvas.height / 2;
const PLAYER_RADIUS = 20;
const SHIELD_DISTANCE = 45;
const SHIELD_WIDTH = 55;
const SHIELD_HEIGHT = 12;
const DEADZONE = 0.4;

let score = 0;
let gameOver = false;
let projectiles = [];
let spawnTimer = 0;
let baseSpawnRate = 140; // Slower starting spawn delay (was 100)

let leftShieldDir = 270;  
let rightShieldDir = 90;  

const COLOR_ORANGE = "#FF8C00";
const COLOR_BLUE = "#00CCFF";

class Projectile {
    constructor() {
        const directions = [0, 90, 180, 270];
        this.incomingFrom = directions[Math.floor(Math.random() * 4)];

        if (this.incomingFrom === 270) { 
            this.x = CENTER_X; this.y = -30; this.vx = 0; this.vy = 1;
        } else if (this.incomingFrom === 90) { 
            this.x = CENTER_X; this.y = canvas.height + 30; this.vx = 0; this.vy = -1;
        } else if (this.incomingFrom === 180) { 
            this.x = -30; this.y = CENTER_Y; this.vx = 1; this.vy = 0;
        } else { 
            this.x = canvas.width + 30; this.y = CENTER_Y; this.vx = -1; this.vy = 0;
        }

        this.color = Math.random() > 0.5 ? COLOR_ORANGE : COLOR_BLUE;
        
        // Slower movement speed curve (Starts at 1.5, caps out at 2.7 at score 10)
        let speedScoreFactor = Math.min(score, 10);
        this.speed = 1.5 + (speedScoreFactor * 0.12); 
    }

    update() {
        this.x += this.vx * this.speed;
        this.y += this.vy * this.speed;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        const angle = Math.atan2(this.vy, this.vx);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(15, 0);       
        ctx.lineTo(-10, -12);    
        ctx.lineTo(-4, -5);      
        ctx.lineTo(-15, -5);     
        ctx.lineTo(-15, 5);      
        ctx.lineTo(-4, 5);       
        ctx.lineTo(-10, 12);     
        ctx.closePath();

        ctx.fillStyle = this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fill();
        ctx.shadowBlur = 0; 

        ctx.strokeStyle = "#FFFFFF";
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.restore();
    }
}

function get4WayDirection(x, y) {
    if (Math.abs(x) < DEADZONE && Math.abs(y) < DEADZONE) return null;
    
    let angle = Math.atan2(y, x) * (180 / Math.PI);
    if (angle < 0) angle += 360;

    if (angle >= 45 && angle < 135) return 90;   
    if (angle >= 135 && angle < 225) return 180; 
    if (angle >= 225 && angle < 315) return 270; 
    return 0;                                    
}

function updateInput() {
    const gamepads = navigator.getGamepads();
    if (!gamepads || !gamepads[0]) return;

    const gp = gamepads[0];

    const lDir = get4WayDirection(gp.axes[0], gp.axes[1]);
    if (lDir !== null) leftShieldDir = lDir;

    const rDir = get4WayDirection(gp.axes[2], gp.axes[3]);
    if (rDir !== null) rightShieldDir = rDir;
    
    if (gameOver && (gp.buttons[0].pressed || gp.buttons[9].pressed)) {
        resetGame();
    }
}

function drawShield(dir, color) {
    ctx.save();
    ctx.translate(CENTER_X, CENTER_Y);
    ctx.rotate(dir * Math.PI / 180);

    ctx.fillStyle = color;
    ctx.shadowBlur = 20;
    ctx.shadowColor = color;
    ctx.fillRect(SHIELD_DISTANCE, -SHIELD_WIDTH / 2, SHIELD_HEIGHT, SHIELD_WIDTH);
    
    ctx.restore();
}

function checkCollisions() {
    for (let i = projectiles.length - 1; i >= 0; i--) {
        let p = projectiles[i];
        let dist = Math.hypot(CENTER_X - p.x, CENTER_Y - p.y);
        
        if (dist <= SHIELD_DISTANCE + 12 && dist >= SHIELD_DISTANCE - 6) {
            let blocked = false;
            if (p.color === COLOR_BLUE && leftShieldDir === p.incomingFrom) blocked = true;
            if (p.color === COLOR_ORANGE && rightShieldDir === p.incomingFrom) blocked = true;

            if (blocked) {
                projectiles.splice(i, 1);
                score++;
                continue;
            }
        }

        if (dist <= PLAYER_RADIUS) {
            gameOver = true;
        }
    }
}

function resetGame() {
    projectiles = [];
    score = 0;
    spawnTimer = 0;
    gameOver = false;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateInput();

    ctx.beginPath();
    ctx.arc(CENTER_X, CENTER_Y, PLAYER_RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = "#111";
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 3;
    ctx.fill();
    ctx.stroke();

    drawShield(leftShieldDir, COLOR_BLUE);
    drawShield(rightShieldDir, COLOR_ORANGE);

    if (!gameOver) {
        // Keeps the layout slightly more open
        let currentSpawnRate = Math.max(35, baseSpawnRate - Math.floor(score * 3));
        
        spawnTimer++;
        if (spawnTimer >= currentSpawnRate) {
            projectiles.push(new Projectile());
            
            if (score >= 20 && Math.random() < 0.35) {
                let p2 = new Projectile();
                let safetyTimeout = 0;
                while (p2.incomingFrom === projectiles[projectiles.length - 1].incomingFrom && safetyTimeout < 10) {
                    p2 = new Projectile();
                    safetyTimeout++;
                }
                projectiles.push(p2);
            }
            
            spawnTimer = 0;
        }

        projectiles.forEach((p) => {
            p.update();
            p.draw();
        });

        checkCollisions();
    } else {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff3333";
        ctx.font = "bold 42px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("CRITICAL FAILURE", CENTER_X, CENTER_Y - 20);
        
        ctx.fillStyle = "#fff";
        ctx.font = "20px sans-serif";
        ctx.fillText(`Final Score: ${score}`, CENTER_X, CENTER_Y + 20);
        ctx.fillText("Press 'A' to Reboot System", CENTER_X, CENTER_Y + 65);
    }

    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px monospace";
    ctx.textAlign = "left";
    ctx.fillText(`SCORE // ${String(score).padStart(4, '0')}`, 25, 45);

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
